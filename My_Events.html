<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Events – Together Culture</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }

    /* Header */
    .header {
      background-color: #a8ecf7;
      text-align: center;
      padding: 20px;
      border-bottom: 2px solid #007c99;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      margin: 5px 0 0;
      font-size: 14px;
    }

    /* Navbar */
    .navbar {
      background-color: #5ba5b6;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      flex-wrap: wrap;
    }

    .nav-left,
    .nav-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .nav-btn {
      background-color: white;
      border: none;
      padding: 6px 12px;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    .nav-icon {
      font-size: 20px;
      background-color: white;
      padding: 5px;
      border-radius: 50%;
    }

    /* Event Section */
    .section {
      padding: 20px;
    }

    .section h2 {
      font-size: 20px;
      margin-bottom: 15px;
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .event-card {
      background-color: #d9d9d9;
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      border-radius: 12px;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .event-card {
        flex-direction: column;
        text-align: center;
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Together Culture</h1>
    <p>Connecting Creativity and Community</p>
  </div>

  <!-- Navbar -->
  <div class="navbar">
    <div class="nav-left">
      <span class="nav-btn">&larr; Back</span>
      <span class="nav-icon">👤</span>
      <button class="nav-btn" style="background-color: #4d98ae; color: white;">My Events</button>
    </div>
    <div class="nav-right">
      <button class="nav-btn">Logout</button>
      <span class="nav-icon">💬</span>
      <span class="nav-icon">🔔</span>
      <span class="nav-icon">🔍</span>
    </div>
  </div>

  <!-- Events Section -->
  <div class="section">
    <h2>Ongoing Events</h2>
    <div class="event-list">
      <div class="event-card">
        <div>Event name</div>
        <div>Details</div>
        <div>Location</div>
      </div>
      <div class="event-card">
        <div>Event name</div>
        <div>Details</div>
        <div>Location</div>
      </div>
    </div>
  </div>

</body>
</html>
