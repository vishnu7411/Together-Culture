<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reviews – Together Culture</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fff;
    }

    /* Header */
    .header {
      background-color: #a8ecf7;
      text-align: center;
      padding: 20px;
      border-bottom: 2px solid #007c99;
    }

    .header h1 {
      margin: 0;
      font-size: 26px;
    }

    .header p {
      margin: 5px 0 0;
      font-size: 14px;
    }

    /* Navbar */
    .navbar {
      background-color: #5ba5b6;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      flex-wrap: wrap;
    }

    .nav-left, .nav-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .nav-btn {
      background-color: white;
      border: none;
      padding: 6px 12px;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    .nav-icon {
      font-size: 20px;
      background-color: white;
      padding: 5px;
      border-radius: 50%;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .container h2 {
      font-size: 20px;
      margin-bottom: 15px;
    }

    .review-card {
      background-color: #d9d9d9;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .review-card label {
      font-weight: bold;
      flex: 1;
      min-width: 100px;
    }

    .review-card input[type="text"] {
      flex: 3;
      min-width: 200px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: #fff0f0;
      margin: 0 10px;
    }

    .review-card button {
      background-color: #aaa;
      border: none;
      padding: 8px 14px;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      .review-card {
        flex-direction: column;
        align-items: stretch;
      }

      .review-card input, .review-card button {
        margin: 10px 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Together Culture</h1>
    <p>Connecting Creativity and Community</p>
  </div>

  <!-- Navbar -->
  <div class="navbar">
    <div class="nav-left">
      <button class="nav-btn">&larr; Back</button>
      <span class="nav-icon">👤</span>
      <button class="nav-btn" style="background-color: #4d98ae; color: white;">Reviews</button>
    </div>
    <div class="nav-right">
      <button class="nav-btn">Logout</button>
      <span class="nav-icon">💬</span>
      <span class="nav-icon">🔔</span>
      <span class="nav-icon">🔍</span>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container">
    <h2>Events</h2>

    <div class="review-card">
      <label>Event name</label>
      <input type="text" placeholder="Write a review...">
      <button>OK</button>
    </div>

    <div class="review-card">
      <label>Event name</label>
      <input type="text" placeholder="Write a review...">
      <button>OK</button>
    </div>

    <div class="review-card">
      <label>Event name</label>
      <input type="text" placeholder="Write a review...">
      <button>OK</button>
    </div>
  </div>

</body>
</html>
